version: 2

# 스키마(description) + 컬럼-레벨 테스트.
# 테이블-레벨 테스트(expression_is_true, unique_combination_of_columns 등)는 _marts_tests.yml 에 분리.

models:
  # ─────────────────────────────
  # Dimension tables
  # ─────────────────────────────

  - name: dim_security
    description: "종목 마스터. sk_id = hash(symbol). 종목명은 여기만 존재(정규화)."
    columns:
      - name: sk_id
        description: "서로게이트 키 = hash(symbol). fct_prices.sk_dim_security 가 참조."
        data_tests: [not_null, unique]
      - name: symbol
        description: "KRX 6자리 상장코드(0패딩 문자열). 자연 키."
        data_tests:
          - not_null
          - unique
      - name: name
        description: "종목명(예: 005930 → 삼성전자)."
        data_tests: [not_null]
      - name: market
        description: "상장 시장."
        data_tests:
          - accepted_values:
              arguments:
                values: ["KOSPI", "KOSDAQ", "KONEX", "KOSPI MARKET", "KOSDAQ MARKET", "KOSDAQ GLOBAL"]

  - name: dim_rate_series
    description: "금리 시리즈 마스터. sk_id = hash(series). fct_rates.sk_dim_rate_series 가 참조."
    columns:
      - name: sk_id
        description: "서로게이트 키 = hash(series)."
        data_tests: [not_null, unique]
      - name: series
        description: "FRED 시리즈 코드(예: DGS10). 자연 키."
        data_tests: [not_null, unique]
      - name: country
        description: "국가 구분(KR/US)."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["KR", "US", "NA"]
      - name: label
        description: "사람용 라벨(예: 미국채 10년)."
        data_tests: [not_null]
      - name: tenor
        description: "만기(3M / 2Y / 10Y / O/N 등)."
        data_tests: [not_null]

  - name: dim_universe_history
    description: >
      유니버스 멤버십 이력 차원. (universe, symbol)별 편입·편출 구간을 보관.
      valid_to=null 이면 현재 편입 중. 편입 전 가격(fct_prices)은 null FK 허용.
      sk_id = hash(universe, symbol, valid_from).
    columns:
      - name: sk_id
        description: "서로게이트 키 = hash(universe, symbol, valid_from)."
        data_tests: [not_null, unique]
      - name: universe
        description: "유니버스 식별자."
        data_tests: [not_null]
      - name: symbol
        description: "KRX 6자리 상장코드."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_security')
                field: symbol
      - name: name
        description: "종목명. dim_security.name 조인값 (예: 005930 → 삼성전자)."
        data_tests: [not_null]
      - name: valid_from
        description: "편입 시작일(포함)."
        data_tests: [not_null]
      - name: valid_to
        description: "편출일(미포함). null 이면 현재 편입 중."
      - name: is_current
        description: "valid_to is null 인 현재 편입 종목."

  - name: dim_macro_series
    description: "매크로 시리즈 마스터. sk_id = hash(series). fct_macro.sk_dim_macro_series 가 참조."
    columns:
      - name: sk_id
        description: "서로게이트 키 = hash(series)."
        data_tests: [not_null, unique]
      - name: series
        description: "시리즈 코드(예: USD/KRW, DTWEXBGS). 자연 키."
        data_tests: [not_null, unique]
      - name: label
        description: "사람용 라벨."
        data_tests: [not_null]
      - name: unit
        description: "단위(KRW / USD/bbl / point 등)."
        data_tests: [not_null]
      - name: country
        description: "국가 구분."
        data_tests:
          - accepted_values:
              arguments:
                values: ["KR", "US", "JP", "CN", "EU", "NA"]
      - name: category
        description: "카테고리(fx/macro/commodity/index/credit/volatility/trade)."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["fx", "macro", "commodity", "index", "credit", "volatility", "trade"]
      - name: source
        description: "수집 소스(fdr/fred). ingest.py 배치 모드에서 참조."
        data_tests: [not_null]
      - name: frequency
        description: "발표 주기(daily/weekly/monthly). assert_macro_series_freshness 테스트 기준."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["daily", "weekly", "monthly"]

  # ─────────────────────────────
  # Fact tables
  # ─────────────────────────────

  - name: fct_prices
    description: >
      일별 수정주가 OHLCV. sk_dim_security → dim_security, sk_dim_universe_history → dim_universe_history.
      편입·비편입 모든 행에 non-null SK 보장 (SCD2 갭 구간으로 커버).
    columns:
      - name: sk_id
        description: "팩트 행 서로게이트 키 = hash(date, universe, symbol). 중복 감지·다운스트림 조인용."
        data_tests: [not_null, unique]
      - name: sk_dim_security
        description: "dim_security.sk_id 참조 = hash(symbol). 종목명 조인 키."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_security')
                field: sk_id
      - name: sk_dim_universe_history
        description: >
          dim_universe_history.sk_id 참조 = hash(universe, symbol, valid_from).
          편입 전 가격 행은 null (pre-membership 가격은 dim에 구간 없음).
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_universe_history')
                field: sk_id
                where: sk_dim_universe_history is not null
      - name: date
        description: "거래일."
        data_tests: [not_null]
      - name: close
        description: "수정주가 종가(KRW). 항상 양수."
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: open
        description: "수정주가 시가. 거래정지일(is_halted=true)은 0."
        data_tests:
          # 거래정지일은 open/high/low=0이 정상.
          - dbt_utils.expression_is_true:
              expression: "> 0 or is_halted"
      - name: high
        description: "수정주가 고가. 거래정지일은 0."
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "> 0 or is_halted"
      - name: low
        description: "수정주가 저가. 거래정지일은 0."
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "> 0 or is_halted"
      - name: volume
        description: "거래량(주). 거래정지일은 0."
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: close_raw
        description: "원본(미수정) 종가. 벤더 미제공 시 null."
      - name: is_halted
        description: "거래정지/무거래(volume=0). dbt ELT 파생값."
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "= (volume = 0)"
      - name: is_member_asof
        description: "그 거래일에 해당 유니버스 멤버였는지(PIT). 생존편향 검증용."

  - name: fct_rates
    description: >
      금리 측정값. 자연 키(series)는 dim_rate_series 에만 존재 — 여기엔 SK + 측정값만.
    columns:
      - name: sk_id
        description: "팩트 행 서로게이트 키 = hash(series, date). 중복 감지·다운스트림 조인용."
        data_tests: [not_null, unique]
      - name: sk_dim_rate_series
        description: "dim_rate_series.sk_id 참조 = hash(series). 그레인 식별자이자 조인 키."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_rate_series')
                field: sk_id
      - name: date
        description: "관측일."
        data_tests: [not_null]
      - name: rate
        description: "연율 퍼센트(예: 3.65 = 3.65%)."
        data_tests:
          - not_null
          # column-level: "rate" 이 prepend → ">= -5 and rate <= 30".
          - dbt_utils.expression_is_true:
              expression: ">= -5 and rate <= 30"

  - name: fct_macro
    description: >
      매크로/FX/원자재/지수/크레딧/변동성 측정값. 자연 키(series)는 dim_macro_series 에만 존재 — 여기엔 SK + 측정값만.
    columns:
      - name: sk_id
        description: "팩트 행 서로게이트 키 = hash(series, date). 중복 감지·다운스트림 조인용."
        data_tests: [not_null, unique]
      - name: sk_dim_macro_series
        description: "dim_macro_series.sk_id 참조 = hash(series). 그레인 식별자이자 조인 키."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_macro_series')
                field: sk_id
      - name: date
        description: "관측일."
        data_tests: [not_null]
      - name: value
        description: "시리즈 값. 단위는 dim_macro_series.unit 참조."
        data_tests:
          - not_null

  - name: fct_stock_features
    description: >
      종목 단면 팩터 mart. grain: (date, symbol, universe).
      raw 팩터 + CS rank(0~1, 항상 높을수록 좋음) + family/composite score.
      CS rank: percent_rank() over (partition by date, universe).
      낮을수록 좋은 팩터(vol, beta)는 1 - percent_rank() 로 반전.
      팩터 패밀리: Momentum / Low-vol / Liquidity (가격 기반).
      Value·Quality·Growth 는 재무 데이터 수집 후 추가 예정.
    columns:
      - name: sk_id
        description: "서로게이트 키 = hash(date, symbol, universe)."
        data_tests: [not_null, unique]
      - name: date
        data_tests: [not_null]
      - name: symbol
        data_tests: [not_null]
      - name: name
        description: "종목명. dim_security 조인."
        data_tests: [not_null]
      - name: universe
        data_tests: [not_null]
      - name: score_composite
        description: "family score 단순평균. 높을수록 복합 팩터 우위."
