version: 2

models:
  # ─────────────────────────────
  # Dimension tables
  # ─────────────────────────────

  - name: dim_security
    description: "종목 마스터. sk_id = hash(symbol). 종목명은 여기만 존재(정규화)."
    columns:
      - name: sk_id
        description: "서로게이트 키 = hash(symbol). fct_prices.sk_dim_security 가 참조."
        data_tests: [not_null, unique]
      - name: symbol
        description: "KRX 6자리 상장코드(0패딩 문자열). 자연 키."
        data_tests:
          - not_null
          - unique
      - name: name
        description: "종목명(예: 005930 → 삼성전자)."
        data_tests: [not_null]
      - name: market
        description: "상장 시장."
        data_tests:
          - accepted_values:
              arguments:
                values: ["KOSPI", "KOSDAQ", "KONEX", "KOSPI MARKET", "KOSDAQ MARKET", "KOSDAQ GLOBAL"]
    data_tests:
      # length() 함수가 포함되어 column-level expression_is_true 사용 불가 → table-level 로.
      - dbt_utils.expression_is_true:
          expression: "length(symbol) = 6"

  - name: dim_universe
    description: >
      PIT 유니버스 멤버십 구간. sk_id = hash(universe, symbol, added).
      [added, removed) 반개구간으로 생존편향을 방지한다.
    columns:
      - name: sk_id
        description: "서로게이트 키 = hash(universe, symbol, added). 각 편입 구간을 고유 식별."
        data_tests: [not_null, unique]
      - name: universe
        description: "유니버스 식별자."
        data_tests: [not_null]
      - name: symbol
        description: "KRX 6자리 상장코드. dim_security 에서 조인해 종목명을 얻는다."
        data_tests:
          - not_null
          # 참조 무결성: 유니버스 멤버는 반드시 종목 마스터에 존재해야 한다.
          - relationships:
              arguments:
                to: ref('dim_security')
                field: symbol
      - name: added
        description: "편입일(구간 시작)."
        data_tests: [not_null]
      - name: removed
        description: "편출일. null 이면 현재까지 편입 유지."
      - name: is_current
        description: "현재 편입 유지 여부(removed is null)."
    data_tests:
      # 각 편입 시작점은 (universe, symbol) 안에서 고유해야 한다.
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [universe, symbol, added]
      # 구간 역전 금지: removed > added (removed is null 이면 열린 구간 → 허용).
      - dbt_utils.expression_is_true:
          expression: "removed is null or removed > added"

  - name: dim_rate_series
    description: "금리 시리즈 마스터. sk_id = hash(series). fct_rates.sk_dim_rate_series 가 참조."
    columns:
      - name: sk_id
        description: "서로게이트 키 = hash(series)."
        data_tests: [not_null, unique]
      - name: series
        description: "FRED 시리즈 코드(예: DGS10). 자연 키."
        data_tests: [not_null, unique]
      - name: country
        description: "국가 구분(KR/US)."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["KR", "US", "NA"]
      - name: label
        description: "사람용 라벨(예: 미국채 10년)."
        data_tests: [not_null]
      - name: tenor
        description: "만기(3M / 2Y / 10Y / O/N 등)."
        data_tests: [not_null]

  - name: dim_macro_series
    description: "매크로 시리즈 마스터. sk_id = hash(series). fct_macro.sk_dim_macro_series 가 참조."
    columns:
      - name: sk_id
        description: "서로게이트 키 = hash(series)."
        data_tests: [not_null, unique]
      - name: series
        description: "시리즈 코드(예: USD/KRW, DTWEXBGS). 자연 키."
        data_tests: [not_null, unique]
      - name: label
        description: "사람용 라벨."
        data_tests: [not_null]
      - name: unit
        description: "단위(KRW / USD/bbl / point 등)."
        data_tests: [not_null]
      - name: country
        description: "국가 구분."
        data_tests:
          - accepted_values:
              arguments:
                values: ["KR", "US", "JP", "NA"]
      - name: category
        description: "카테고리."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["fx", "macro", "commodity", "index"]

  # ─────────────────────────────
  # Fact tables
  # ─────────────────────────────

  - name: fct_prices
    description: "일별 수정주가 OHLCV. sk_dim_security → dim_security, sk_dim_universe → dim_universe."
    columns:
      - name: sk_dim_security
        description: "dim_security.sk_id 참조 = hash(symbol). 종목명 조인 키."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_security')
                field: sk_id
      - name: sk_dim_universe
        description: "dim_universe.sk_id 참조 = hash(universe, symbol, added). 비편입 행은 null."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_universe')
                field: sk_id
      - name: universe
        description: "유니버스 식별자. 자연 키(필터용)."
        data_tests: [not_null]
      - name: symbol
        description: "KRX 6자리 상장코드. 자연 키(필터용)."
        data_tests: [not_null]
      - name: date
        description: "거래일."
        data_tests: [not_null]
      - name: close
        description: "수정주가 종가(KRW). 항상 양수."
        data_tests:
          - not_null
          # column-level expression_is_true: column_name 이 자동 prepend → expression 에 column명 제외.
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: open
        data_tests:
          # 거래정지일(is_halted=true)은 open/high/low=0이 정상 (마지막 기준가 이월).
          - dbt_utils.expression_is_true:
              expression: "> 0 or is_halted"
      - name: high
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "> 0 or is_halted"
      - name: low
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "> 0 or is_halted"
      - name: volume
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: close_raw
        description: "원본(미수정) 종가. 벤더 미제공 시 null."
      - name: is_halted
        description: "거래정지/무거래(volume=0). dbt ELT 파생값."
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "= (volume = 0)"
      - name: is_member_asof
        description: "그 거래일에 해당 유니버스 멤버였는지(PIT). 생존편향 검증용."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [date, universe, symbol]
      # OHLC 기본 일관성: 고가 ≥ 저가 (거래정지일도 0 ≥ 0이므로 성립).
      # high vs close/open 비교는 FDR 수정주가 반올림 오차(최대 1원)로 위반 가능하여 제외.
      - dbt_utils.expression_is_true:
          expression: "high >= low"

  - name: fct_rates
    description: >
      금리 측정값. 자연 키(series)는 dim_rate_series 에만 존재 — 여기엔 SK + 측정값만.
    columns:
      - name: sk_dim_rate_series
        description: "dim_rate_series.sk_id 참조 = hash(series). 그레인 식별자이자 조인 키."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_rate_series')
                field: sk_id
      - name: date
        description: "관측일."
        data_tests: [not_null]
      - name: rate
        description: "연율 퍼센트(예: 3.65 = 3.65%)."
        data_tests:
          - not_null
          # column-level: "rate" 이 prepend → ">= -5 and rate <= 30" 으로 작성.
          - dbt_utils.expression_is_true:
              expression: ">= -5 and rate <= 30"
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [sk_dim_rate_series, date]

  - name: fct_macro
    description: >
      매크로/FX/원자재/지수 측정값. 자연 키(series)는 dim_macro_series 에만 존재 — 여기엔 SK + 측정값만.
    columns:
      - name: sk_dim_macro_series
        description: "dim_macro_series.sk_id 참조 = hash(series). 그레인 식별자이자 조인 키."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_macro_series')
                field: sk_id
      - name: date
        description: "관측일."
        data_tests: [not_null]
      - name: value
        description: "시리즈 값(양수 — FX·지수·원자재 모두 양수)."
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [sk_dim_macro_series, date]
