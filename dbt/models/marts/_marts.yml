version: 2

models:
  - name: fct_prices
    description: "일별 수정주가 OHLCV(유니버스별). 백테스트·대시보드의 단일 소스."
    columns:
      - name: universe
        description: "유니버스 식별자(예: kospi40). 어느 종목 집합의 가격인지."
        data_tests: [not_null]
      - name: symbol
        description: >
          KRX 6자리 상장코드(0패딩 문자열, 예 '005930').
          dim_universe.symbol 및 소스 ticker 와 동일한 조인 키.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_universe')
                field: symbol
      - name: date
        description: "거래일."
        data_tests: [not_null]
      - name: close
        description: "수정주가 종가(KRW). 분할·배당 반영."
      - name: close_raw
        description: "원본(미수정) 종가. 벤더 미제공 시 null(수정계수 복원 불가)."
      - name: volume
        description: "거래량."
      - name: is_halted
        description: "거래정지/무거래(거래량 0). 백테스트는 이 날 체결 불가로 본다."
      - name: is_member_asof
        description: "그 거래일에 해당 유니버스 멤버였는지(point-in-time). 생존편향 검증·필터용."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [date, universe, symbol]

  - name: dim_universe
    description: "Point-in-time 유니버스 멤버십 구간. [added, removed) 반개구간(생존편향 방지)."
    columns:
      - name: universe
        description: "유니버스 식별자."
        data_tests: [not_null]
      - name: symbol
        description: "KRX 6자리 상장코드. fct_prices.symbol 와 동일 키. 종목명은 dim_security 에서 조인."
        data_tests: [not_null]
      - name: added
        description: "편입일(관측 시작)."
        data_tests: [not_null]
      - name: removed
        description: "편출일. null 이면 편입 유지. 상장폐지·편출 이력을 보존."
      - name: is_current
        description: "현재 편입 유지 여부(removed is null)."

  - name: fct_rates
    description: "금리 시리즈(무위험·국채). country 로 KR/US 구분, series 로 시리즈 식별."
    columns:
      - name: series
        description: "FRED 시리즈 코드(예: DGS10). 식별 키."
        data_tests: [not_null]
      - name: country
        description: "국가 구분(KR/US). 한국채 vs 미국채 구별 키."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["KR", "US", "NA"]
      - name: rate
        description: "연율 퍼센트(예: 3.65 = 3.65%)."
        data_tests: [not_null]
      - name: label
        description: "사람용 라벨(seed rate_series 조인)."
      - name: tenor
        description: "만기(3M/2Y/10Y/O·N 등, seed 조인)."

  - name: fct_macro
    description: "매크로/FX/원자재/지수 시계열. macro_series seed 메타데이터 포함."
    columns:
      - name: series
        description: "시리즈 코드(예: USD/KRW, KS11, DTWEXBGS). 식별 키."
        data_tests: [not_null]
      - name: date
        description: "관측일."
        data_tests: [not_null]
      - name: value
        description: "시리즈 값."
        data_tests: [not_null]
      - name: label
        description: "사람용 라벨(예: 달러-원 환율)."
      - name: unit
        description: "단위(예: KRW, USD/bbl, point)."
      - name: country
        description: "국가 구분(KR/US/JP/NA)."
      - name: category
        description: "카테고리(fx / macro / commodity / index)."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [series, date]

  - name: dim_security
    description: "종목 마스터. symbol → name·market. symbol 이 실제 어느 종목인지 해석하는 단일 소스."
    columns:
      - name: symbol
        description: "KRX 6자리 상장코드(0패딩 문자열). fct_prices/dim_universe.symbol 와 동일 키."
        data_tests:
          - not_null
          - unique
      - name: name
        description: "종목명(예: 005930 → 삼성전자)."
        data_tests: [not_null]
      - name: market
        description: "상장 시장(KOSPI/KOSDAQ 등)."
