version: 2

# 스키마(description) + 컬럼-레벨 테스트.
# 테이블-레벨 테스트(expression_is_true, unique_combination_of_columns 등)는 _marts_tests.yml 에 분리.

models:
  # ─────────────────────────────
  # Dimension tables
  # ─────────────────────────────

  - name: dim_security
    description: "종목 마스터. sk_id = hash(symbol). 종목명은 여기만 존재(정규화)."
    columns:
      - name: sk_id
        description: "서로게이트 키 = hash(symbol). fct_prices.sk_dim_security 가 참조."
        data_tests: [not_null, unique]
      - name: symbol
        description: "KRX 6자리 상장코드(0패딩 문자열). 자연 키."
        data_tests:
          - not_null
          - unique
      - name: name
        description: "종목명(예: 005930 → 삼성전자)."
        data_tests: [not_null]
      - name: market
        description: "상장 시장."
        data_tests:
          - accepted_values:
              arguments:
                values: ["KOSPI", "KOSDAQ", "KONEX", "KOSPI MARKET", "KOSDAQ MARKET", "KOSDAQ GLOBAL"]

  - name: dim_rate_series
    description: "금리 시리즈 마스터. sk_id = hash(series). fct_rates.sk_dim_rate_series 가 참조."
    columns:
      - name: sk_id
        description: "서로게이트 키 = hash(series)."
        data_tests: [not_null, unique]
      - name: series
        description: "FRED 시리즈 코드(예: DGS10). 자연 키."
        data_tests: [not_null, unique]
      - name: country
        description: "국가 구분(KR/US)."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["KR", "US", "NA"]
      - name: label
        description: "사람용 라벨(예: 미국채 10년)."
        data_tests: [not_null]
      - name: tenor
        description: "만기(3M / 2Y / 10Y / O/N 등)."
        data_tests: [not_null]

  - name: dim_universe_history
    description: >
      유니버스 멤버십 이력 차원. (universe, symbol)별 편입·편출 구간을 보관.
      valid_to=null 이면 현재 편입 중. 편입 전 가격(fct_prices)은 null FK 허용.
      sk_id = hash(universe, symbol, valid_from).
    columns:
      - name: sk_id
        description: "서로게이트 키 = hash(universe, symbol, valid_from)."
        data_tests: [not_null, unique]
      - name: universe
        description: "유니버스 식별자."
        data_tests: [not_null]
      - name: symbol
        description: "KRX 6자리 상장코드."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_security')
                field: symbol
      - name: name
        description: "종목명. dim_security.name 조인값 (예: 005930 → 삼성전자)."
        data_tests: [not_null]
      - name: valid_from
        description: "편입 시작일(포함)."
        data_tests: [not_null]
      - name: valid_to
        description: "편출일(미포함). null 이면 현재 편입 중."
      - name: is_current
        description: "valid_to is null 인 현재 편입 종목."

  - name: dim_macro_series
    description: "매크로 시리즈 마스터. sk_id = hash(series). fct_macro.sk_dim_macro_series 가 참조."
    columns:
      - name: sk_id
        description: "서로게이트 키 = hash(series)."
        data_tests: [not_null, unique]
      - name: series
        description: "시리즈 코드(예: USD/KRW, DTWEXBGS). 자연 키."
        data_tests: [not_null, unique]
      - name: label
        description: "사람용 라벨."
        data_tests: [not_null]
      - name: unit
        description: "단위(KRW / USD/bbl / point 등)."
        data_tests: [not_null]
      - name: country
        description: "국가 구분."
        data_tests:
          - accepted_values:
              arguments:
                values: ["KR", "US", "JP", "CN", "EU", "NA"]
      - name: category
        description: "카테고리(fx/macro/commodity/index/credit/volatility/trade)."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["fx", "macro", "commodity", "index", "credit", "volatility", "trade"]
      - name: source
        description: "수집 소스(fdr/fred). ingest.py 배치 모드에서 참조."
        data_tests: [not_null]
      - name: frequency
        description: "발표 주기(daily/weekly/monthly). assert_macro_series_freshness 테스트 기준."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["daily", "weekly", "monthly"]

  # ─────────────────────────────
  # Fact tables
  # ─────────────────────────────

  - name: fct_prices
    description: >
      일별 수정주가 OHLCV. sk_dim_security → dim_security, sk_dim_universe_history → dim_universe_history.
      편입·비편입 모든 행에 non-null SK 보장 (SCD2 갭 구간으로 커버).
    columns:
      - name: sk_id
        description: "팩트 행 서로게이트 키 = hash(date, universe, symbol). 중복 감지·다운스트림 조인용."
        data_tests: [not_null, unique]
      - name: sk_dim_security
        description: "dim_security.sk_id 참조 = hash(symbol). 종목명 조인 키."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_security')
                field: sk_id
      - name: sk_dim_universe_history
        description: >
          dim_universe_history.sk_id 참조 = hash(universe, symbol, valid_from).
          편입 전 가격 행은 null (pre-membership 가격은 dim에 구간 없음).
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_universe_history')
                field: sk_id
                where: sk_dim_universe_history is not null
      - name: date
        description: "거래일."
        data_tests: [not_null]
      - name: close
        description: "수정주가 종가(KRW). 항상 양수."
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: open
        description: "수정주가 시가. 거래정지일(is_halted=true)은 0."
        data_tests:
          # 거래정지일은 open/high/low=0이 정상.
          - dbt_utils.expression_is_true:
              expression: "> 0 or is_halted"
      - name: high
        description: "수정주가 고가. 거래정지일은 0."
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "> 0 or is_halted"
      - name: low
        description: "수정주가 저가. 거래정지일은 0."
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "> 0 or is_halted"
      - name: volume
        description: "거래량(주). 거래정지일은 0."
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: close_raw
        description: "원본(미수정) 종가. 벤더 미제공 시 null."
      - name: is_halted
        description: "거래정지/무거래(volume=0). dbt ELT 파생값."
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "= (volume = 0)"
      - name: is_member_asof
        description: "그 거래일에 해당 유니버스 멤버였는지(PIT). 생존편향 검증용."

  - name: fct_rates
    description: >
      금리 측정값. 자연 키(series)는 dim_rate_series 에만 존재 — 여기엔 SK + 측정값만.
    columns:
      - name: sk_id
        description: "팩트 행 서로게이트 키 = hash(series, date). 중복 감지·다운스트림 조인용."
        data_tests: [not_null, unique]
      - name: sk_dim_rate_series
        description: "dim_rate_series.sk_id 참조 = hash(series). 그레인 식별자이자 조인 키."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_rate_series')
                field: sk_id
      - name: date
        description: "관측일."
        data_tests: [not_null]
      - name: rate
        description: "연율 퍼센트(예: 3.65 = 3.65%)."
        data_tests:
          - not_null
          # column-level: "rate" 이 prepend → ">= -5 and rate <= 30".
          - dbt_utils.expression_is_true:
              expression: ">= -5 and rate <= 30"

  - name: fct_macro
    description: >
      매크로/FX/원자재/지수/크레딧/변동성 측정값. 자연 키(series)는 dim_macro_series 에만 존재 — 여기엔 SK + 측정값만.
    columns:
      - name: sk_id
        description: "팩트 행 서로게이트 키 = hash(series, date). 중복 감지·다운스트림 조인용."
        data_tests: [not_null, unique]
      - name: sk_dim_macro_series
        description: "dim_macro_series.sk_id 참조 = hash(series). 그레인 식별자이자 조인 키."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_macro_series')
                field: sk_id
      - name: date
        description: "관측일."
        data_tests: [not_null]
      - name: value
        description: "시리즈 값. 단위는 dim_macro_series.unit 참조."
        data_tests:
          - not_null

  - name: fct_stock_features
    description: >
      종목 단면 팩터 mart. grain: (date, symbol, universe).
      raw 팩터 + CS rank(0~1, 항상 높을수록 좋음) + family/composite score.
      CS rank: percent_rank() over (partition by date, universe).
      낮을수록 좋은 팩터(vol, beta)는 1 - percent_rank() 로 반전.
      팩터 패밀리: Momentum / Low-vol / Liquidity (가격 기반).
      Value·Quality·Growth 는 재무 데이터 수집 후 추가 예정.
    columns:
      - name: sk_id
        description: "서로게이트 키 = hash(date, symbol, universe)."
        data_tests: [not_null, unique]
      - name: sk_dim_security
        description: "dim_security.sk_id 참조 = hash(symbol)."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_security')
                field: sk_id
      - name: sk_dim_universe_history
        description: "dim_universe_history.sk_id 참조. AS-OF 조인으로 해당 날짜의 멤버십 구간 매핑."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_universe_history')
                field: sk_id
      - name: date
        data_tests: [not_null]
      # ── Raw 팩터 ──────────────────────────────────────────────
      - name: mom_1m
        description: "1개월 모멘텀: close / p_1m - 1 (소수, 예: 0.05 = 5%)."
      - name: mom_6m
        description: "6개월 모멘텀: close / p_6m - 1."
      - name: mom_12_1m
        description: "표준 12-1M 모멘텀: p_1m / p_12m - 1. 최근 1개월 제외로 단기 반전 제거."
      - name: rev_1w
        description: "1주 수익률: close / p_5d - 1. 단기 반전 시그널."
      - name: hi52w_ratio
        description: "52주 최고가 대비 현재가: close / max(close, 252d). 1에 가까울수록 신고가 근처."
      - name: vol_1m
        description: "실현변동성 21일: 일간수익률 표준편차."
      - name: vol_3m
        description: "실현변동성 63일."
      - name: beta_1y
        description: "KOSPI 대비 252일 베타 (OLS slope). 1보다 크면 시장보다 민감."
      - name: idio_vol_1m
        description: "특이변동성 21일: sqrt(var(ret) - β²·var(kospi)). 종목 고유 리스크."
      - name: adv_20d
        description: "거래대금 20일 평균 (KRW, volume×close 근사). 유동성 대리변수."
      - name: vol_surge
        description: "거래대금 급등: adv_5d / adv_20d. 1보다 크면 최근 거래 급증."
      # ── CS rank (0~1, 항상 높을수록 유리) ────────────────────
      - name: mom_12_1m_rank
        description: "mom_12_1m 의 CS rank. 모멘텀 강할수록 높음."
      - name: mom_6m_rank
        description: "mom_6m 의 CS rank."
      - name: mom_1m_rank
        description: "mom_1m 의 CS rank."
      - name: rev_1w_rank
        description: "rev_1w 의 CS rank. 현재 모멘텀 방향 유지 (반전 전략 시 1-rank 사용)."
      - name: hi52w_ratio_rank
        description: "hi52w_ratio 의 CS rank."
      - name: vol_1m_rank
        description: "vol_1m 의 역 CS rank (1 - percent_rank). 변동성 낮을수록 높음."
      - name: vol_3m_rank
        description: "vol_3m 의 역 CS rank."
      - name: beta_1y_rank
        description: "beta_1y 의 역 CS rank. 베타 낮을수록 높음."
      - name: idio_vol_rank
        description: "idio_vol_1m 의 역 CS rank. 특이변동성 낮을수록 높음."
      - name: adv_20d_rank
        description: "adv_20d 의 CS rank. 거래대금 클수록 높음."
      - name: vol_surge_rank
        description: "vol_surge 의 CS rank."
      # ── Family / composite score ───────────────────────────────
      - name: score_mom
        description: "모멘텀 패밀리 score: (mom_12_1m + mom_6m + rev_1w + hi52w_ratio rank) / 4."
      - name: score_lowvol
        description: "저변동성 패밀리 score: (vol_1m + idio_vol rank) / 2. beta_1y 는 모멘텀과 역상관(-0.88)으로 composite 상쇄 방지를 위해 제외, beta_1y_rank 는 참조용으로만 보존."
      - name: score_liq
        description: "유동성 패밀리 score: (adv_20d + vol_surge rank) / 2."
      - name: score_composite
        description: "패밀리 score 단순평균: (mom + lowvol + liq) / 3. 리밸런싱 상위 N종목 선정 기준."
