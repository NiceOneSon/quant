version: 2

# 테스트 전용 파일 — 스키마(description/meta)는 _marts.yml 에 있음.
# dbt 는 같은 디렉터리의 모든 .yml 을 병합하므로 model name 이 일치하면 분리 가능.

models:
  - name: dim_security
    columns:
      - name: sk_id
        data_tests: [not_null, unique]
      - name: symbol
        data_tests: [not_null, unique]
      - name: name
        data_tests: [not_null]
      - name: market
        data_tests:
          - accepted_values:
              arguments:
                values: ["KOSPI", "KOSDAQ", "KONEX", "KOSPI MARKET", "KOSDAQ MARKET", "KOSDAQ GLOBAL"]
    data_tests:
      # length() 함수는 column-level expression_is_true 에서 쓸 수 없어 table-level 로.
      - dbt_utils.expression_is_true:
          expression: "length(symbol) = 6"

  - name: dim_universe
    columns:
      - name: sk_id
        data_tests: [not_null, unique]
      - name: universe
        data_tests: [not_null]
      - name: symbol
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_security')
                field: symbol
      - name: added
        data_tests: [not_null]
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [universe, symbol, added]
      - dbt_utils.expression_is_true:
          expression: "removed is null or removed > added"

  - name: dim_rate_series
    columns:
      - name: sk_id
        data_tests: [not_null, unique]
      - name: series
        data_tests: [not_null, unique]
      - name: country
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["KR", "US", "NA"]
      - name: label
        data_tests: [not_null]
      - name: tenor
        data_tests: [not_null]

  - name: dim_macro_series
    columns:
      - name: sk_id
        data_tests: [not_null, unique]
      - name: series
        data_tests: [not_null, unique]
      - name: label
        data_tests: [not_null]
      - name: unit
        data_tests: [not_null]
      - name: country
        data_tests:
          - accepted_values:
              arguments:
                values: ["KR", "US", "JP", "CN", "EU", "NA"]
      - name: category
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["fx", "macro", "commodity", "index", "credit", "volatility"]

  - name: fct_prices
    columns:
      - name: sk_dim_security
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_security')
                field: sk_id
      - name: sk_dim_universe
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_universe')
                field: sk_id
      - name: universe
        data_tests: [not_null]
      - name: symbol
        data_tests: [not_null]
      - name: date
        data_tests: [not_null]
      - name: close
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: open
        data_tests:
          # 거래정지일(is_halted=true)은 open/high/low=0이 정상.
          - dbt_utils.expression_is_true:
              expression: "> 0 or is_halted"
      - name: high
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "> 0 or is_halted"
      - name: low
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "> 0 or is_halted"
      - name: volume
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: is_halted
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "= (volume = 0)"
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [date, universe, symbol]
      # FDR 수정주가 반올림 오차(최대 1원)로 high vs close/open 비교는 제외.
      - dbt_utils.expression_is_true:
          expression: "high >= low"

  - name: fct_rates
    columns:
      - name: sk_dim_rate_series
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_rate_series')
                field: sk_id
      - name: date
        data_tests: [not_null]
      - name: rate
        data_tests:
          - not_null
          # column-level: "rate" 이 prepend → ">= -5 and rate <= 30".
          - dbt_utils.expression_is_true:
              expression: ">= -5 and rate <= 30"
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [sk_dim_rate_series, date]

  - name: fct_macro
    columns:
      - name: sk_dim_macro_series
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_macro_series')
                field: sk_id
      - name: date
        data_tests: [not_null]
      - name: value
        data_tests:
          - not_null
          # 크레딧·BEI·실업지표 등 다양한 스케일 → not_null 만 강제.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [sk_dim_macro_series, date]
