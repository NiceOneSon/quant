version: 2

# intermediate 레이어 — ephemeral 로 mart 에 인라인.
# 조인·PIT 로직만 담당. 직접 노출하지 않음(외부 parquet 없음).

models:
  - name: int_rates_enriched
    description: >
      stg_rates(date, series, rate) 에서 그대로 통과.
      label·tenor·country 는 fct_rates → dim_rate_series 조인에서 파생하므로 여기선 붙이지 않음.
      fct_rates 의 직접 소스.
    columns:
      - name: date
        description: "관측일."
        data_tests: [not_null]
      - name: series
        description: "FRED 시리즈 코드. fct_rates 에서 hash(series) → sk_dim_rate_series 로 변환."
        data_tests: [not_null]
      - name: rate
        description: "연율 퍼센트(예: 3.65 = 3.65%)."
        data_tests: [not_null]

  - name: int_daily_returns
    description: >
      종목 일간수익률 + KOSPI 수익률. int_stock_features 의 소스.
      거래정지일(is_halted=true)은 ret_1d=null 로 rolling 계산에서 자동 제외.
      is_member_asof=true 종목만 포함 (생존편향 없는 PIT 필터).
    columns:
      - name: date
        data_tests: [not_null]
      - name: symbol
        data_tests: [not_null]
      - name: universe
        data_tests: [not_null]
      - name: ret_1d
        description: "일간 단순수익률. 거래정지일 null."
      - name: turnover
        description: "거래대금 근사치 = volume × close (KRW)."
      - name: kospi_ret_1d
        description: "KOSPI 지수 일간수익률. 베타 계산 기준."

  - name: int_stock_features
    description: >
      종목 단면 팩터 raw 값. rolling 윈도우 계산.
      팩터: Momentum / Low-vol / Liquidity (가격 기반).
      Value·Quality 는 재무 데이터 수집 후 추가 예정.
      fct_stock_features 에서 CS rank·composite score 추가.
    columns:
      - name: date
        data_tests: [not_null]
      - name: symbol
        data_tests: [not_null]
      - name: universe
        data_tests: [not_null]
      - name: mom_12_1m
        description: "표준 모멘텀: p_1m / p_12m - 1. 최근 1개월 제외."
      - name: rev_1w
        description: "1주 단기반전: close / p_5d - 1. 음수 신호."
      - name: hi52w_ratio
        description: "52주 최고가 대비: close / max(close, 252d)."
      - name: vol_1m
        description: "실현변동성 21일."
      - name: beta_1y
        description: "KOSPI 대비 252일 베타 (OLS slope)."
      - name: idio_vol_1m
        description: "특이변동성 21일: sqrt(var(ret) - β²·var(kospi))."
      - name: adv_20d
        description: "거래대금 20일 평균 (KRW)."
      - name: vol_surge
        description: "거래대금 급등: adv_5d / adv_20d."

  - name: int_prices_pit
    description: >
      stg_prices × stg_universe AS-OF 조인.
      is_member_asof: 해당 거래일에 그 유니버스 편입 멤버였는지 — 생존편향 없는 필터 기준.
      _membership_added: 편입일(added). fct_prices 에서 sk_dim_universe_history 해시 계산용(소비자 비노출).
      fct_prices 의 직접 소스.
    columns:
      - name: universe
        description: "유니버스 식별자."
        data_tests: [not_null]
      - name: symbol
        description: "KRX 6자리 상장코드."
        data_tests: [not_null]
      - name: date
        description: "거래일."
        data_tests: [not_null]
      - name: open
        description: "수정주가 시가(KRW). 거래정지일은 0."
      - name: high
        description: "수정주가 고가(KRW). 거래정지일은 0."
      - name: low
        description: "수정주가 저가(KRW). 거래정지일은 0."
      - name: close
        description: "수정주가 종가(KRW). 항상 양수."
        data_tests: [not_null]
      - name: volume
        description: "거래량(주). 거래정지일은 0."
      - name: close_raw
        description: "원본(미수정) 종가. FDR 소스는 항상 null."
      - name: is_halted
        description: "거래정지 여부. stg_prices 에서 (volume = 0) 으로 파생."
        data_tests: [not_null]
      - name: is_member_asof
        description: >
          해당 거래일에 그 유니버스 편입 멤버였는지(PIT).
          left join 결과: 편입 구간 내 → true, 비편입/공백 기간 → false.
        data_tests: [not_null]
      - name: _membership_added
        description: "stg_universe.added. sk_dim_universe_history 해시 계산용 내부 컬럼."
