# DuckDB UI 에 등록할 뷰 정의.
#   table = dbt 모델명, 값 = DATA_DIR 기준 parquet 경로.
# 주의: DuckDB UI 는 쿼리마다 새 연결을 열고 기본 스키마가 main 으로 고정된다
# (search_path 는 connection-scoped, GLOBAL 설정 불가 — 실측). 따라서 "접두어 없이"
# 조회되도록 마트 뷰를 main 스키마에 둔다. 레이어 구분은 dbt(marts/ 디렉터리)가 보유.
schemas:
  main:
    fct_prices: marts/fct_prices.parquet
    dim_universe: marts/dim_universe.parquet
    fct_rates: marts/fct_rates.parquet
